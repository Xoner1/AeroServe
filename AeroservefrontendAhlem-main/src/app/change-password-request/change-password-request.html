<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    .btn-reset {
      background-color: #6B8374;
      border: 1px solid #6B8374;
      color: white;
      border-radius: 10px;
      padding: 12px;
      width: 100%;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-reset:hover {
      background-color: #5A7263;
      border-color: #5A7263;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(107, 131, 116, 0.2);
    }

    .btn-reset:active {
      transform: scale(0.98);
    }

    .btn-reset:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 40px;
      background: linear-gradient(180deg, #FAFAF8 0%, #F0EFEA 100%);
    }

    .image {
      max-width: 450px;
      height: auto;
    }

    .form-signin {
      max-width: 500px;
      padding: 30px;
      background-color: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(26, 29, 27, 0.06);
      border: 1px solid #E5E4E0;
    }

    .form-signin h3 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1A1D1B;
      text-align: center;
      margin-bottom: 8px;
    }

    .form-signin p {
      color: #8E938F;
      text-align: center;
      margin-bottom: 20px;
    }

    .form-control {
      border-radius: 10px;
      padding: 14px;
      border: 1.5px solid #E5E4E0;
      transition: all 0.15s ease;
    }

    .form-control:focus {
      border-color: #6B8374;
      box-shadow: 0 0 0 3px rgba(107, 131, 116, 0.12);
    }

    .alert {
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="auth-wrapper">

  <div class="image-wrapper">
    <img src="assets/reset.jpg" alt="Reset" class="image">
  </div>

  <form class="form-signin" [formGroup]="resetForm" (ngSubmit)="onSubmit()">

    <h3>Reset Password</h3>
    <p>Provide your email to reset your password.</p>

    @if (errors) {
      <div class="alert alert-danger">
        {{ errors }}
      </div>
    }

    @if (successMsg) {
      <div class="alert alert-success">
        {{ successMsg }}
      </div>
    }

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        class="form-control"
        formControlName="email"
        placeholder="example@email.com"
      />

      @if (resetForm.get('email')?.touched && resetForm.get('email')?.invalid) {
        <small class="text-danger">
          Email invalide
        </small>
      }
    </div>

    <button
      type="submit"
      class="btn btn-reset mt-3"
      [disabled]="loading || resetForm.invalid"
    >
      {{ loading ? 'Envoi...' : 'Reset Password' }}
    </button>

  </form>

</div>

</body>
</html>
