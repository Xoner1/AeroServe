<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    .btn-reset {
  background-color: #ad3e3e;
  border: 1px solid #ad3e3e;
  color: white;
  border-radius: 10px;
  padding: 12px;
  width: 100%;
  font-weight: 600;
  transition: all 0.3s ease;
}

.btn-reset:hover {
  background-color: #7f2a2a;
  border-color: #7f2a2a;
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

.btn-reset:active {
  transform: scale(0.98);
}

.btn-reset:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
  .auth-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 40px;
}

/* IMAGE PLUS GRANDE */
.image {
  max-width: 450px;
  height: auto;
}

/* CARD PLUS LARGE */
.form-signin {
  max-width: 500px;
  padding: 30px;
  background-color: #fff;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
}

/* TITRE */
.form-signin h3 {
  font-size: 1.6rem;
  font-weight: bold;
  color: #cf6f02;
  text-align: center;
}

/* BOUTON ROUGE BRIQUE */
.btn-primary {
  background-color: #e44d4d;
  border-color: #cf4343;
  border-radius: 10px;
  padding: 12px;
  width: 100%;
  font-weight: 600;
  transition: all 0.3s ease;
}

/* HOVER PROPRE */
.btn-primary:hover {
  background-color: #7f2a2a;
  border-color: #7f2a2a;
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

/* CLICK EFFECT */
.btn-primary:active {
  transform: scale(0.98);
}

/* INPUT */
.form-control {
  border-radius: 10px;
  padding: 14px;
}

/* ALERT */
.alert {
  border-radius: 10px;
  margin-top: 10px;
}
  </style>
</head>

<body>

<div class="auth-wrapper">

  <!-- IMAGE -->
  <div class="image-wrapper">
    <img src="assets/reset.jpg" alt="Reset" class="image">
  </div>

  <!-- FORM -->
  <form class="form-signin" [formGroup]="resetForm" (ngSubmit)="onSubmit()">

    <h3>Reset Password</h3>

    <p>Provide your email to reset your password.</p>

    <!-- ERROR -->
    @if (errors) {
      <div class="alert alert-danger">
        {{ errors }}
      </div>
    }

    <!-- SUCCESS -->
    @if (successMsg) {
      <div class="alert alert-success">
        {{ successMsg }}
      </div>
    }

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        class="form-control"
        formControlName="email"
        placeholder="example@email.com"
      />

      @if (resetForm.get('email')?.touched && resetForm.get('email')?.invalid) {
        <small class="text-danger">
          Email invalide
        </small>
      }
    </div>

   <button
  type="submit"
  class="btn btn-reset"
  [disabled]="loading || resetForm.invalid"
>
  {{ loading ? 'Envoi...' : 'Reset Password' }}
</button>

  </form>

</div>

</body>
</html>
